name: Run pytest tests

on:
  workflow_call:
    inputs:
      python-versions:
        description: 'Supported python versions'
        default: '["3.10", "3.11", "3.12", "3.13", "3.14", "pypy-3.11"]'
        required: false
        type: string
      postgresql:
        description: 'PostgreSQL version'
        required: true
        type: number
      os:
        description: 'Operating system to run tests on'
        default: 'ubuntu-latest'
        required: false
        type: string
    secrets:
      codecov_token:
        description: 'Codecov token'
        required: false

jobs:
  postgres:
    runs-on: ${{ inputs.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    env:
      OS: ${{ inputs.os }}
      PYTHON: ${{ matrix.python-version }}
      POSTGRES: ${{ inputs.postgresql }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Pipenv on python ${{ matrix.python-version }}
        uses: fizyk/actions-reuse/.github/actions/uv-setup@e434952f57d1da48b52d0fe5454b365b2f297d2d # v5.2.6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: ankane/setup-postgres@v1
        with:
          postgres-version: ${{ inputs.postgresql }}
      - name: Set PostgreSQL path
        run: |
          # Try to find pg_ctl dynamically for cross-platform compatibility
          if command -v pg_ctl >/dev/null 2>&1; then
            PG_CTL_PATH=$(command -v pg_ctl)
            echo "POSTGRESQL_EXEC=$PG_CTL_PATH" >> $GITHUB_ENV
          elif [ -f "/opt/homebrew/opt/postgresql@${{ inputs.postgresql }}/bin/pg_ctl" ]; then
            # macOS Apple Silicon Homebrew path
            echo "POSTGRESQL_EXEC=/opt/homebrew/opt/postgresql@${{ inputs.postgresql }}/bin/pg_ctl" >> $GITHUB_ENV
          elif [ -f "/usr/local/opt/postgresql@${{ inputs.postgresql }}/bin/pg_ctl" ]; then
            # macOS Intel Homebrew path
            echo "POSTGRESQL_EXEC=/usr/local/opt/postgresql@${{ inputs.postgresql }}/bin/pg_ctl" >> $GITHUB_ENV
          elif [ -f "/usr/lib/postgresql/${{ inputs.postgresql }}/bin/pg_ctl" ]; then
            # Debian/Ubuntu path (fallback)
            echo "POSTGRESQL_EXEC=/usr/lib/postgresql/${{ inputs.postgresql }}/bin/pg_ctl" >> $GITHUB_ENV
          else
            echo "Error: pg_ctl not found in expected locations"
            exit 1
          fi
      - name: Check installed locales
        run: |
          locale -a
      - name: update locale for tests
        if: ${{ inputs.os == 'ubuntu-latest' }}
        run: |
          sudo locale-gen de_DE.UTF-8
      - name: install libpq
        if: ${{ contains(matrix.python-version, 'pypy') && runner.os == 'Linux' }}
        run: sudo apt install libpq5
      - name: Run test
        id: run_serial_tests
        uses: fizyk/actions-reuse/.github/actions/uv-run@e434952f57d1da48b52d0fe5454b365b2f297d2d # v5.2.6
        with:
          command: python -m coverage run --data-file=.coverage.serial -m pytest -svv -p no:xdist --postgresql-exec="${{ env.POSTGRESQL_EXEC }}" -k "not docker" --basetemp="${{ runner.temp }}/pytest-basetemp"
          env: '{"COVERAGE_PROCESS_START": ".coveragerc", "COVERAGE_FILE": ".coverage.serial"}'
      - name: Combine and export serial coverage
        if: ${{ always() && (steps.run_serial_tests.conclusion == 'success' || steps.run_serial_tests.conclusion == 'failure') }}
        uses: fizyk/actions-reuse/.github/actions/coverage-combine-export-uv@e434952f57d1da48b52d0fe5454b365b2f297d2d # v5.2.6
        with:
          data-file: .coverage.serial
          output-file: coverage-serial.xml
      - name: Run xdist test
        id: run_xdist_tests
        uses: fizyk/actions-reuse/.github/actions/uv-run@e434952f57d1da48b52d0fe5454b365b2f297d2d # v5.2.6
        with:
          command: python -m coverage run --data-file=.coverage.xdist -m pytest -n auto --dist loadgroup --max-worker-restart 0 --postgresql-exec="${{ env.POSTGRESQL_EXEC }}" -k "not docker" --basetemp="${{ runner.temp }}/pytest-basetemp"
          env: '{"COVERAGE_PROCESS_START": ".coveragerc", "COVERAGE_FILE": ".coverage.xdist"}'
      - name: Combine and export xdist coverage
        if: ${{ always() && (steps.run_xdist_tests.conclusion == 'success' || steps.run_xdist_tests.conclusion == 'failure') }}
        uses: fizyk/actions-reuse/.github/actions/coverage-combine-export-uv@e434952f57d1da48b52d0fe5454b365b2f297d2d # v5.2.6
        with:
          data-file: .coverage.xdist
          output-file: coverage-xdist.xml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: postgresql-${{ matrix.python-version }}-${{ inputs.postgresql }}
          path: ${{ runner.temp }}/pytest-basetemp/**
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.1
        with:
          token: ${{ secrets.codecov_token }}
          flags: unittests
          env_vars: OS,PYTHON
          fail_ci_if_error: false
          files: coverage-serial.xml,coverage-xdist.xml
